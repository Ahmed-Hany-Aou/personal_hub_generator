<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- META_TAGS -->
    <style>
        :root {
            --primary: {{accentColor}};
            --bg: #050505;
            --cyber-pink: #ff00ff;
            --cyber-blue: #00ffff;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
            opacity: 0.3;
        }

        .card {
            position: relative;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid var(--primary);
            padding: 50px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px var(--primary), inset 0 0 10px var(--primary);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
            animation: glitch 5s infinite alternate;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 2px); }
            2% { transform: translate(2px, -2px); }
            3% { transform: translate(0); }
            100% { transform: translate(0); }
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--cyber-blue);
            box-shadow: 0 0 15px var(--cyber-blue);
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .avatar:hover {
            border-color: var(--cyber-pink);
            box-shadow: 0 0 25px var(--cyber-pink);
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0;
            color: white;
            text-shadow: 2px 2px 0 var(--cyber-pink), -2px -2px 0 var(--cyber-blue);
        }

        .job-title {
            color: var(--cyber-blue);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            margin: 10px 0 35px;
            letter-spacing: 2px;
        }

        .link-item {
            display: block;
            background: transparent;
            border: 1px solid var(--primary);
            padding: 15px;
            margin-bottom: 12px;
            color: var(--text);
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.2s;
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s both;
            animation-delay: var(--delay, 0s);
        }

        .link-item:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px var(--primary);
            transform: skew(-5deg);
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-icon {
            color: var(--cyber-pink);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            border-bottom: 2px solid var(--cyber-pink);
            transition: 0.3s;
        }

        .social-icon:hover {
            color: white;
            border-color: white;
            text-shadow: 0 0 10px white;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            opacity: 0.5;
            font-family: monospace;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
                width: 85%;
            }
            h1 {
                font-size: 1.6rem;
            }
            .avatar {
                width: 100px; height: 100px;
                margin-bottom: 20px;
            }
            .job-title {
                font-size: 0.75rem;
                margin-bottom: 25px;
            }
            .link-item {
                padding: 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="card">
        {{components}}
    </div>
</body>
</html>
