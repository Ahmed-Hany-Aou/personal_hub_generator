<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- META_TAGS -->
    <style>
        :root {
            --primary: {{accentColor}};
            --secondary: #6366f1;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }

        .blob-1 { top: -100px; left: -100px; animation: mix 20s infinite alternate; }
        .blob-2 { bottom: -100px; right: -100px; animation: mix 15s infinite alternate-reverse; }

        @keyframes mix {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(100px, 50px); }
        }

        @keyframes blurIn {
            from { opacity: 0; filter: blur(20px); transform: translateY(20px) scale(0.95); }
            to { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(0deg); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass);
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: blurIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            transform: rotate(-3deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #1e293b url('https://api.dicebear.com/7.x/initials/svg?seed=user') center/cover;
            animation: float 6s ease-in-out infinite;
        }

        .avatar:hover {
            transform: rotate(0deg) scale(1.1);
            box-shadow: 0 0 30px var(--primary);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 0.8s 0.2s both;
        }

        .job-title {
            color: #94a3b8;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 10px 0 40px;
            animation: slideUp 0.8s 0.4s both;
        }

        .links-grid {
            display: grid;
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.8s both;
            animation-delay: var(--delay, 0s);
        }


        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            animation: slideUp 0.8s 0.6s both;
        }

        .social-icon {
            color: #94a3b8;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 14px;
        }
        .social-icon:hover { 
            color: white; 
            transform: translateY(-5px) scale(1.2);
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
                border-radius: 24px;
                width: 85%;
            }
            h1 { font-size: 24px; }
            .avatar { width: 100px; height: 100px; border-radius: 20px; }
            .job-title { font-size: 14px; margin-bottom: 30px; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        {{components}}
    </div>
</body>
</html>
