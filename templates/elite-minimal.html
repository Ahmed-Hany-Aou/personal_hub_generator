<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{fullName}} - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            min-height: 100vh;
        }

        .left-col {
            flex: 1;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .right-col {
            width: 40%;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 80px;
            font-weight: 700;
            margin: 0;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 24px;
            font-weight: 300;
            margin-top: 20px;
            color: #666;
        }

        .links {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-btn {
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            color: #000;
            border-bottom: 2px solid transparent;
            width: fit-content;
            transition: all 0.3s;
        }

        .link-btn:hover {
            border-color: #000;
            padding-left: 10px;
        }

        .footer {
            font-size: 14px;
            color: #999;
            margin-top: 60px;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .left-col { padding: 40px; order: 2; }
            .right-col { width: 100%; height: 300px; order: 1; }
            h1 { font-size: 48px; }
        }
    </style>
</head>
<body>
    <div class="left-col">
        <div>
            <h1>{{fullName}}</h1>
            <p class="subtitle">{{jobTitle}}</p>
            
            <div class="links">
                {{#links}}
                <a href="{{url}}" class="link-btn" target="_blank">{{label}}</a>
                {{/links}}
                <a href="contact.vcf" class="link-btn" style="color: {{accentColor}};">↓ Download vCard</a>
            </div>
        </div>

        <div class="footer">
            Design: Minimalist Pro / BMAD Elite
        </div>
    </div>

    <div class="right-col">
        <img src="profile_pic.png" alt="{{fullName}}" class="profile-img">
    </div>
</body>
</html>
