<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Hany - Elite Digital Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #6366f1cc; /* Slightly transparent secondary */
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Abstract Background Elements */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            opacity: 0.4;
        }
        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; }

        /* Creative Effects */
        
        .blob {
            animation: moveBloom 20s infinite alternate linear;
        }
        @keyframes moveBloom {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 50px) scale(1.2); }
        }
        

        

        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }

        .avatar-container:hover .avatar {
            transform: rotate(0deg) scale(1.05);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .job-title {
            color: #94a3b8;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 10px 0 40px;
        }

        .links-grid {
            display: grid;
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 20px;
            font-size: 18px;
            margin-top: 20px;
            box-shadow: 0 10px 20px -5px #6366f166;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px #6366f199;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-icon {
            color: #94a3b8;
            transition: color 0.3s;
        }
        .social-icon:hover { color: white; }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <div class="avatar-container">
            <img src="profile_pic.png" alt="Ahmed Hany" class="avatar">
        </div>

        <h1>Ahmed Hany</h1>
        <p class="job-title">Software Engineer</p>

        <div class="links-grid">
            
            <a href="https://ahmed-hany-aou.github.io/" class="link-item" target="_blank">🎨 View Portfolio</a>
            

            <a href="https://ahmed-hany-aou.github.io/resume.pdf" class="link-item" target="_blank">📄 View CV</a>
            

            <a href="https://ahmed-hany-aou.github.io/app" class="link-item" target="_blank">🚀 Live Production App</a>
            

            <a href="https://github.com/ahmed-hany-aou" class="link-item" target="_blank">💻 GitHub Profile</a>
            

            <a href="https://linkedin.com/in/ahmed-hany-aou" class="link-item" target="_blank">🔗 LinkedIn</a>
            
            
            <a href="contact.vcf" class="link-item primary-btn">Save Contact Info</a>
        </div>

        <div class="social-row">
            <a href="tel:+20 1065232774" class="social-icon">Call</a>
            <a href="https://wa.me/{{whatsAppNumber}}" class="social-icon">WhatsApp</a>
        </div>

        <div class="footer">
            Elite Design Suite by BMAD
        </div>
    </div>
</body>
</html>
