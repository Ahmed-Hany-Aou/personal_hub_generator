<div class="tech-card-container" style="position: relative; padding: 2rem; background: var(--bg); border: 1px solid var(--primary); border-radius: 24px; overflow: hidden;">
    <div class="pulse-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, var(--primary) 0%, transparent 70%); opacity: 0.05; animation: pulse 4s infinite alternate;"></div>

    <div class="profile-header" style="text-align: center; margin-bottom: 2rem;">
        <div class="avatar-ring" style="width: 140px; height: 140px; margin: 0 auto 1.5rem; border-radius: 50%; padding: 4px; background: linear-gradient(45deg, var(--primary), transparent, var(--primary)); animation: rotate 10s linear infinite;">
            <img src="{{profileImage}}" alt="{{fullName}}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg);">
        </div>
        <h1 style="font-size: 2.2rem; font-weight: 800; letter-spacing: -0.02em; margin: 0; text-transform: uppercase;">{{fullName}}</h1>
        <p class="job-title" style="color: var(--primary); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 0.5rem;">{{jobTitle}}</p>
    </div>

    <style>
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.02; transform: scale(0.95); } 100% { opacity: 0.08; transform: scale(1.05); } }
    </style>
</div>
