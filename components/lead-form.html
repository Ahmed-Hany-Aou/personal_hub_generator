<div class="lead-form-card">
    <h3>{{title}}</h3>
    <form id="leadForm-{{designId}}" onsubmit="handleLeadSubmit(event, '{{designId}}', '{{webhookUrl}}')">
        <div class="form-grid">
            <input type="text" name="Name" placeholder="Full Name" required>
            <input type="email" name="Email" placeholder="Email Address" required>
            <button type="submit" class="cta-button solid">
                Submit Application
            </button>
        </div>
    </form>
    <div id="success-{{designId}}" class="success-pop">
        <p>✅ {{successMessage}}</p>
    </div>
</div>

<style>
    .lead-form-card {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        padding: 2rem;
        border-radius: 24px;
        margin: 2rem 0;
        backdrop-filter: blur(10px);
        animation: slideUp 0.8s 1s both;
    }
    .lead-form-card h3 {
        margin-bottom: 1.5rem;
        font-size: 1.4rem;
        color: white;
    }
    .form-grid {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .lead-form-card input {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--glass-border);
        padding: 0.8rem 1rem;
        border-radius: 12px;
        color: white;
        outline: none;
        transition: all 0.3s ease;
    }
    .lead-form-card button.cta-button {
        background: var(--primary);
        padding: 1rem;
        border-radius: 12px;
        border: none;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }
    .lead-form-card input:focus {
        background: rgba(255,255,255,0.1) !important;
        border-color: var(--primary) !important;
        box-shadow: 0 0 15px var(--primary);
        transform: scale(1.02);
    }
    .lead-form-card input {
        transition: all 0.3s ease;
    }
    .success-pop {
        display: none;
        text-align: center;
        padding: 1rem;
        animation: success-entrance 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .success-pop p {
        color: #4ade80;
        font-weight: 600;
        font-size: 1.2rem;
        margin: 0;
    }
    @keyframes success-entrance {
        from { transform: scale(0.5); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
</style>

<script>
    async function handleLeadSubmit(e, designId, webhook) {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData);

        // Log to Analytics
        fetch('/api/analytics/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ designId, type: 'lead_capture', details: data })
        });

        if (webhook) {
            try { await fetch(webhook, { method: 'POST', body: JSON.stringify(data) }); } catch(err) {}
        }

        form.style.display = 'none';
        document.getElementById(`success-${designId}`).style.display = 'block';
    }
</script>
