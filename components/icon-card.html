<a href="{{url}}" class="icon-card" target="_blank" style="display: flex; align-items: center; gap: 0.8rem; background: rgba(255,255,255,0.05); padding: 0.8rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; transition: transform 0.2s ease;">
    <div class="icon-wrapper" style="font-size: 1.2rem; color: var(--primary);">
        <i class="bi bi-{{icon}}"></i>
    </div>
    <span class="icon-label" style="font-size: 0.8rem; color: white;">{{label}}</span>
</a>
