<div class="nano-contact-row" style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; transition: 0.3s; margin-bottom: 0.8rem; cursor: pointer;">
    <div class="icon-box" style="width: 44px; height: 44px; background: rgba(0, 255, 255, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--primary);">
        <i class="{{icon}}" style="font-size: 1.2rem;"></i>
    </div>
    <div class="contact-details" style="flex: 1;">
        <label style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.1rem;">{{label}}</label>
        <span style="font-size: 1rem; font-weight: 500; color: var(--text);">{{value}}</span>
    </div>
    <div class="action-arrow" style="color: rgba(255, 255, 255, 0.15); font-size: 0.8rem;">
        <i class="fas fa-chevron-right"></i>
    </div>
</div>
