<div class="qr-display {{style}}" style="margin-top: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
    <div class="qr-container" style="background: white; padding: 1rem; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
        <img src="/api/qr?url={{url}}" alt="QR Code" style="width: 150px; height: 150px;">
    </div>
    <p style="font-size: 0.7rem; color: var(--text-dim);">Scan to connect</p>
</div>
